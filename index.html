<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Scene</title>
<link rel="stylesheet" href="hstyle.css">
</head>

<body>

<div class="scene"> 

    
    <audio id="musicPlayer" preload="auto">
        <source src="audio/music.m4a" type="audio/mpeg">
    </audio>

    <!-- ID CARD -->
    <a href="about.html" class="id-card">
        <img src="images/id2.png" class="card-base">
        <img src="images/id3.png" class="card-photo">
    </a>

    <!-- HEADER -->
    <div class="header-area">
        <img src="images/header.png" class="hero-title">
        
    </div>

    <!-- DESK -->
    <div class="desk-wrapper">

        <div class="mat-container">
            <img src="images/mat01.png" class="mat">

            <a class="item camera" href="camera.html">
                <img src="images/camm.png">
            </a>

            <!-- 🎧 VINYL -->
            <div class="item vinyl" id="vinyl">
                <img src="images/music.png">
            </div>

            <a class="item journal" href="journal.html">
                <img src="images/journal.png">
            </a>

            <div class="item cat">
                <img src="images/jubi.png">
            </div>

            <div class="item coke">
                <img src="images/coke.png">
            </div>

            <a class="item folder" href="creativecoding.html">
                <img src="images/cc.png">
            </a>

        </div>
    </div>

</div>

<!-- PARALLAX -->
<script>
const desk = document.querySelector(".desk-wrapper");

document.addEventListener("mousemove", (e) => {
    let x = (window.innerWidth / 2 - e.clientX) / 40;
    let y = (window.innerHeight / 2 - e.clientY) / 40;

    desk.style.transform =
        `translate(-50%, -50%) rotateY(${x}deg) rotateX(${y}deg)`;
});
</script>

<!-- 🎧 VINYL CONTROL -->
<script>
const vinyl = document.getElementById("vinyl");
const music = document.getElementById("musicPlayer");

vinyl.addEventListener("mouseenter", () => {
    music.play().then(() => {
        vinyl.classList.add("playing");
    }).catch(err => {
        console.log("Audio blocked by browser policy. Interaction usually required first.", err);
    });
});

vinyl.addEventListener("mouseleave", () => {
    music.pause();
    music.currentTime = 0; // Optional: Resets song to start
    vinyl.classList.remove("playing");
});
</script>

</body>
</html>
